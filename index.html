<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ethereal Forest</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #f0dcc8; }
      #app { position: fixed; inset: 0; }
      #app canvas { display: block; width: 100%; height: 100%; }

        #loader {
        position: fixed; inset: 0; z-index: 60;
        display: flex; align-items: center; justify-content: center;
        background: #f0dcc8;
        font: 0.85rem/1.4 ui-sans-serif, system-ui, sans-serif;
        color: #6d7a62; letter-spacing: 0.2em;
        transition: opacity 0.8s ease;
      }
      #loader.is-hidden { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="loader"><span class="pct">…</span></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
